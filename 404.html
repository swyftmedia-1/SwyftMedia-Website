<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Swyft Media Productions</title>
    <script type="text/javascript">
      // This script takes the current URL (e.g., /about) and hides it in the URL 
      // as a parameter so the main index.html can "read" it and load the right page.
      var pathSegmentsToKeep = 0; // Set to 1 if your site is at username.github.io/repo-name/

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
