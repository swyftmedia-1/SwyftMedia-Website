<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirect</title>
    <script>
      // Redirect all routes to index.html
      var path = window.location.pathname;
      var newUrl = window.location.origin + "/?redirect=" + path;
      window.location.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
