    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion || window.FramerMotion || {

        // ==================================================================================
        // SHARED UTILITIES, SEO HOOKS & ICONS
        // ==================================================================================

        // Dynamic SEO Hook for updating title and meta tags per page view (AEO/GEO optimization)
        const useSEO = (title, description) => {
            useEffect(() => {
                document.title = `${title} | Swyft Media`;
                let metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) {
                    metaDesc.content = description;
                }
            }, [title, description]);
        };

        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true">{children}</svg>
        );

        const Menu = (props) => <Icon {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>;
        const X = (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const ArrowRight = (props) => <Icon {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
        const CheckCircle = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
        const Plus = (props) => <Icon {...props}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></Icon>;
        const Minus = (props) => <Icon {...props}><line x1="5" y1="12" x2="19" y2="12"></line></Icon>;

        // React Component to dynamically inject Schema markup safely
        const SchemaInjector = ({ schema }) => (
            <script type="application/ld+json" dangerouslySetInnerHTML={{ __html: JSON.stringify(schema) }} />
        );

        // Smooth Fade In component
        const FadeIn = ({ children, delay = 0, className = "", direction = "up" }) => {
            const yOffset = direction === "up" ? 30 : direction === "down" ? -30 : 0;
            const xOffset = direction === "left" ? 30 : direction === "right" ? -30 : 0;
            return (
                <motion.div
                    initial={{ opacity: 0, y: yOffset, x: xOffset }}
                    whileInView={{ opacity: 1, y: 0, x: 0 }}
                    viewport={{ once: true, margin: "-50px" }}
                    transition={{ duration: 0.7, delay, ease: [0.21, 0.47, 0.32, 0.98] }}
                    className={className}
                >
                    {children}
                </motion.div>
            );
        };

        // Staggered Container for Grid Items
        const StaggerWrap = ({ children, className = "" }) => (
            <motion.div
                variants={{ hidden: {}, visible: { transition: { staggerChildren: 0.1 } } }}
                initial="hidden"
                whileInView="visible"
                viewport={{ once: true, margin: "-50px" }}
                className={className}
            >
                {children}
            </motion.div>
        );

        const StaggerItem = ({ children, className = "" }) => (
            <motion.div
                variants={{
                    hidden: { opacity: 0, y: 30 },
                    visible: { opacity: 1, y: 0, transition: { duration: 0.6, ease: "easeOut" } }

            >

        // ==================================================================================

                { q: "How long does the branding process take?", a: "A typical branding project takes between 4 to 8 weeks from kickoff to final delivery. However, the exact timeline depends heavily on the scope and complexity of the project. A simple visual identity might take 3-4 weeks, while a comprehensive brand strategy and full rollout could take 8-12 weeks." },

                                <div className="w-full aspect-square bg-gray-200 rounded-[3rem] rounded-tr-xl rounded-bl-xl overflow-hidden mb-6 shadow-2xl">
                                    <motion.img 
                                        whileHover={{ scale: 1.05 }}
                                        transition={{ duration: 0.5 }}
                                        src="Prashant Gupta.webp?auto=format&fit=crop&q=80&w=800" 
                                        alt="Prashant Gupta - Founder of Swyft Media" 
                                        className="w-full h-full object-cover" 
                                    />
                                </div>
                                <h1 id="founder-name" className="text-4xl font-black mb-2">Prashant Gupta</h1>
                                <p className="text-lg text-gray-500 font-bold uppercase tracking-widest">Founder</p>
                            </FadeIn>
                            <FadeIn direction="left" delay={0.2} className="prose prose-lg max-w-none text-gray-700">
                                <p className="mb-6 leading-relaxed">
                                    Prashant Gupta is the founder and driving force behind Swyft Media, a dynamic PR and branding agency known for crafting powerful public narratives and building influential brands. With a deep understanding of media strategy, storytelling, and digital trends, Prashant has helped numerous clients—from startups to established enterprises—elevate their public presence and shape their brand voice with authenticity and impact.
                                </p>
                                <p className="mb-6 leading-relaxed">
                                    Under his leadership, Swyft Media has grown into a trusted partner for media outreach, crisis communication, and brand transformation. Prashant’s strategic vision and relentless creativity have positioned the agency at the forefront of modern public relations in India.
                                </p>
                                <p className="leading-relaxed">
                                    A firm believer in the power of connection, he leads with the philosophy that great brands don’t just communicate—they engage, inspire, and lead conversations.
                                </p>
                                
                                <div className="mt-12 pt-12 border-t border-gray-200">
                                    <h2 className="text-2xl font-black uppercase mb-8">Achievements</h2>
                                    <ul className="space-y-8">
                                        <li>
                                            <strong className="block text-xl mb-2">Gurudwara Shri Guru Nanak Darbar, Lakhpat, Gujarat</strong>
                                            <span className="text-gray-600 block leading-relaxed">We are honoured to digitally serve at the sacred Gurudwara Shri Guru Nanak Darbar, Lakhpat, Gujarat – a beacon of peace and spirituality.</span>
                                        </li>
                                        <li>
                                            <strong className="block text-xl mb-2">MoU UPSTDC</strong>
                                            <span className="text-gray-600 block leading-relaxed">Signed a Memorandum of Understanding (MoU) with the Uttar Pradesh State Development Corporation (UPSTDC)</span>
                                        </li>
                                        <li>
                                            <strong className="block text-xl mb-2">GMA 2022 / 2023</strong>
                                            <span className="text-gray-600 block leading-relaxed">Awarded Best Web Story 2023 by Hon'ble CM of Gujarat, Shri Bhupendra Patel</span>
                                        </li>
                                    </ul>
                                </div>
                            </FadeIn>
                        </div>
                    </article>

                    {/* Rest of the Team */}
                    <section aria-labelledby="team-heading">
                        <FadeIn className="mb-16 text-center">
                            <h2 id="team-heading" className="text-4xl md:text-5xl font-black mb-6">The talented team of creative and jaw-dropping designers and marketers.</h2>
                            <p className="text-xl text-gray-600 max-w-3xl mx-auto leading-relaxed">
                                Our dedication and commitment to excellence ensure that your business thrives in the ever-evolving branding design agency.
                            </p>
                        </FadeIn>

                        <StaggerWrap className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                            {FULL_TEAM.slice(1).map((member, idx) => (
                                <StaggerItem key={idx}>
                                    <motion.article 
                                        whileHover={{ y: -10 }}
                                        className="bg-white p-8 flex flex-col items-center text-center group rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.04)] hover:shadow-xl transition-all h-full border border-gray-50"
                                    >
                                        <div className="w-32 h-32 bg-gray-200 rounded-[2rem] rounded-tr-lg rounded-bl-lg mb-6 overflow-hidden shadow-inner rotate-3 group-hover:rotate-0 transition-transform duration-500">
                                            <img 
                                                src={member.image} 
                                                alt={`Photo of ${member.name}`}
                                                loading="lazy" 
                                                className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" 
                                            />
                                        </div>
                                        <h3 className="text-xl font-bold mb-2">{member.name}</h3>
                                        <p className="text-xs text-gray-500 uppercase tracking-widest font-semibold">{member.role}</p>
                                    </motion.article>
                                </StaggerItem>
                            ))}
                        </StaggerWrap>
                    </section>
                </div>
            );
        };

        // ==================================================================================
        // MAIN APP COMPONENT
        // ==================================================================================

        const App = () => {
            const [currentPage, setCurrentPage] = useState("Home");
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isUIHovered, setIsUIHovered] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);
            const [hasHover, setHasHover] = useState(true);

            // Listen for scrolling and hover capabilities
            useEffect(() => {
                // Check if device supports hover
                setHasHover(window.matchMedia("(hover: hover)").matches);
                
                const handleScroll = () => {
                    // Show UI if scrolled past 50% of the screen height
                    setIsScrolled(window.scrollY > window.innerHeight * 0.5);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Scroll to top automatically when navigating to a new page
            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [currentPage]);

            const renderPage = () => {
                switch(currentPage) {
                    case "Home": 
                        return <HomePage 
                            setPage={setCurrentPage} 
                            isUIHovered={isUIHovered} 
                            setIsUIHovered={setIsUIHovered}
                            hasHover={hasHover} 
                        />;
                    case "About Us":
                        return <AboutPage />;
                    case "Service":
                        return <ServicePage />;
                    case "Media Coverage":
                        return <MediaCoveragePage />;
                    case "Projects":
                        return <ProjectsPage />;
                    case "Contact Us":
                        return <ContactPage />;
                    case "People":
                        return <PeoplePage />;
                    default: 
                        return <HomePage 
                            setPage={setCurrentPage} 
                            isUIHovered={isUIHovered} 
                            setIsUIHovered={setIsUIHovered}
                            hasHover={hasHover} 
                        />;
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <Header 
                        setPage={setCurrentPage} 
                        currentPage={currentPage} 
                        isMenuOpen={isMenuOpen} 
                        setIsMenuOpen={setIsMenuOpen} 
                        isUIHovered={isUIHovered}
                        setIsUIHovered={setIsUIHovered}
                        isScrolled={isScrolled}
                        hasHover={hasHover}
                    />
                    
                    <main className="flex-grow">
                        <AnimatePresence mode="wait">
                            <motion.div
                                key={currentPage}
                                initial={{ opacity: 0, y: 15 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -15 }}
                                transition={{ duration: 0.4, ease: "easeInOut" }}
                            >
                                {renderPage()}
                            </motion.div>
                        </AnimatePresence>
                    </main>

                    <Footer setPage={setCurrentPage} />
                </div>
            );
        };

        // Render the React application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
