    <style>

            overflow-x: hidden;

        }

        }

            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: currentColor;
            transition: width 0.3s ease;

            { name: "Tanay Sheth", role: "Social Media Manager", image: "https://api.dicebear.com/7.x/initials/svg?seed=TanaySheth&backgroundColor=e5e7eb&textColor=000000" },

                                    <p>+91 9574705941</p>
                                    <p className="mt-1">info@swyftmedia.in</p>
                                </div>
                            </div>
                        </div>

        const ProjectsPage = () => {
            return (
                <div className="pt-32 pb-24 px-6 container mx-auto">
                    <FadeIn className="mb-16">
                        <p className="text-sm font-bold uppercase tracking-widest text-gray-500 mb-4">Our project</p>
                        <h1 className="text-5xl md:text-7xl font-black mb-6 uppercase tracking-tighter">A deeply impactful and unforgettable experience</h1>
                        <div className="flex space-x-6 text-sm font-bold uppercase tracking-widest mt-8">
                            <a href="#" className="border-b-2 border-black pb-1 hover:text-gray-500">View All projects</a>
                            <a href="#" className="border-b-2 border-transparent pb-1 hover:text-gray-500 hover:border-gray-500 transition-colors">Follow Instagram</a>
                            <a href="#" className="border-b-2 border-transparent pb-1 hover:text-gray-500 hover:border-gray-500 transition-colors">Follow LinkedIn</a>
                        </div>
                    </FadeIn>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-24">
                        {FULL_PROJECTS.map((project, index) => (
                            <FadeIn key={index} delay={index * 0.05} className="group relative cursor-pointer overflow-hidden rounded-sm h-96 flex flex-col justify-end">
                                <img src={project.image} alt={project.client} className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent transition-opacity duration-300 group-hover:bg-black/70"></div>
                                <div className="relative p-8 z-10">
                                    <h3 className="text-2xl font-bold mb-2 text-white group-hover:text-yellow-400 transition-colors">{project.client}</h3>
                                    <div>
                                        <p className="text-sm text-gray-300 uppercase tracking-widest">{project.type}</p>
                                        <p className="text-xs text-gray-400 mt-1">{project.type.split(' ')[0]} — {project.year === "Recent" ? "1 Nov 2023" : project.year}</p>
                                    </div>
                                </div>
                            </FadeIn>
                        ))}
                    </div>

                    {/* CTA */}
                    <FadeIn className="text-center py-20 bg-gray-50 rounded-sm">
                        <h2 className="text-4xl font-black mb-4 uppercase">Have a project in mind?</h2>
                        <p className="text-xl text-gray-600 mb-8">Let's work together</p>
                        <button className="bg-black text-white px-8 py-4 font-bold uppercase tracking-wider hover:bg-gray-800 transition-all">
                            Get in touch
                        </button>
                    </FadeIn>
                </div>
            );
        };

        // ==================================================================================
        // PAGE: CONTACT US
        // ==================================================================================

        const ContactPage = () => {
            return (
                <div className="pt-32 pb-24 px-6 container mx-auto">
                    <FadeIn className="text-center mb-16">
                        <p className="text-sm font-bold uppercase tracking-widest text-gray-500 mb-4">Discover the creativity and skills!</p>
                        <h1 className="text-5xl md:text-7xl font-black mb-6 uppercase tracking-tighter">Got Questions? Let’s Connect and Make Magic Happen</h1>
                        <p className="text-xl text-gray-600 max-w-3xl mx-auto">
                            We are eagerly waiting for you to explore our services. Let us help you achieve your digital goals with innovative solutions and expert guidance.
                        </p>
                    </FadeIn>

                    <div className="grid lg:grid-cols-2 gap-16 mt-20">
                        {/* Form */}
                        <FadeIn className="bg-gray-50 p-10 rounded-sm">
                            <form className="space-y-6" onSubmit={(e) => e.preventDefault()}>
                                <div>
                                    <label className="block text-sm font-bold uppercase tracking-widest mb-2">Your name</label>
                                    <input type="text" className="w-full border-b-2 border-gray-300 bg-transparent py-3 focus:outline-none focus:border-black transition-colors" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold uppercase tracking-widest mb-2">Your email</label>
                                    <input type="email" className="w-full border-b-2 border-gray-300 bg-transparent py-3 focus:outline-none focus:border-black transition-colors" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold uppercase tracking-widest mb-2">Subject</label>
                                    <input type="text" className="w-full border-b-2 border-gray-300 bg-transparent py-3 focus:outline-none focus:border-black transition-colors" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold uppercase tracking-widest mb-2">Your message (optional)</label>
                                    <textarea rows="4" className="w-full border-b-2 border-gray-300 bg-transparent py-3 focus:outline-none focus:border-black transition-colors"></textarea>
                                </div>
                                <button type="submit" className="bg-black text-white px-8 py-4 font-bold uppercase tracking-wider hover:bg-gray-800 transition-all w-full mt-4">
                                    Submit
                                </button>
                            </form>
                        </FadeIn>

                        {/* Details */}
                        <FadeIn delay={0.2} className="flex flex-col justify-center space-y-12">
                            <div>
                                <h3 className="text-3xl font-black mb-4 uppercase">Ahmedabad</h3>
                                <p className="text-gray-600 text-lg mb-4 leading-relaxed">707, Iscon Elegance, Near Shapath-V, S.G. Highway, Ahmedabad- 380015</p>
                                <ul className="space-y-2 text-lg font-semibold">
                                    <li>+91 79661 68548</li>
                                    <li>+91 9879509784</li>
                                    <li>+91 7096427107</li>
                                    <li>+91 9574705941</li>
                                    <li className="text-blue-600 mt-2">info@swyftmedia.in</li>
                                </ul>
                            </div>
                            <div className="border-t border-gray-200 pt-12">
                                <h3 className="text-3xl font-black mb-4 uppercase">Gandhidham</h3>
                                <p className="text-gray-600 text-lg mb-4 leading-relaxed">Plot No 108, Sector 1A, Gandhidham-Kutch, Gujarat. 370201</p>
                                <ul className="space-y-2 text-lg font-semibold">
                                    <li>+91 9879509784</li>
                                    <li>+91 9574705941</li>
                                    <li className="text-blue-600 mt-2">info@swyftmedia.in</li>
                                </ul>
                            </div>
                        </FadeIn>
                    </div>
                </div>
            );
        };

        // ==================================================================================
        // PAGE: PEOPLE
        // ==================================================================================

        const PeoplePage = () => {
            return (
                <div className="pt-32 pb-24 px-6 container mx-auto">
                    {/* Founder Profile */}
                    <section className="mb-24">
                        <div className="grid md:grid-cols-[1fr_2fr] gap-12 items-start">
                            <FadeIn>
                                <div className="w-full aspect-square bg-gray-200 rounded-sm overflow-hidden mb-6">
                                    <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=800" alt="Prashant Gupta" className="w-full h-full object-cover" />
                                </div>
                                <h1 className="text-4xl font-black mb-2">Prashant Gupta</h1>
                                <p className="text-lg text-gray-500 font-bold uppercase tracking-widest">Founder</p>
                            </FadeIn>
                            <FadeIn delay={0.2} className="prose prose-lg max-w-none text-gray-700">
                                <p className="mb-6">
                                    Prashant Gupta is the founder and driving force behind Swyft Media, a dynamic PR and branding agency known for crafting powerful public narratives and building influential brands. With a deep understanding of media strategy, storytelling, and digital trends, Prashant has helped numerous clients—from startups to established enterprises—elevate their public presence and shape their brand voice with authenticity and impact.
                                </p>
                                <p className="mb-6">
                                    Under his leadership, Swyft Media has grown into a trusted partner for media outreach, crisis communication, and brand transformation. Prashant’s strategic vision and relentless creativity have positioned the agency at the forefront of modern public relations in India.
                                </p>
                                <p>
                                    A firm believer in the power of connection, he leads with the philosophy that great brands don’t just communicate—they engage, inspire, and lead conversations.
                                </p>
                                
                                <div className="mt-12 pt-8 border-t border-gray-200">
                                    <h3 className="text-2xl font-black uppercase mb-6">Achievements</h3>
                                    <ul className="space-y-6">
                                        <li>
                                            <strong className="block text-xl mb-1">Gurudwara Shri Guru Nanak Darbar, Lakhpat, Gujarat</strong>
                                            <span className="text-gray-600">We are honoured to digitally serve at the sacred Gurudwara Shri Guru Nanak Darbar, Lakhpat, Gujarat – a beacon of peace and spirituality.</span>
                                        </li>
                                        <li>
                                            <strong className="block text-xl mb-1">MoU UPSTDC</strong>
                                            <span className="text-gray-600">Signed a Memorandum of Understanding (MoU) with the Uttar Pradesh State Development Corporation (UPSTDC)</span>
                                        </li>
                                        <li>
                                            <strong className="block text-xl mb-1">GMA 2022 / 2023</strong>
                                            <span className="text-gray-600">Awarded Best Web Story 2023 by Hon'ble CM of Gujarat, Shri Bhupendra Patel</span>
                                        </li>
                                    </ul>
                                </div>
                            </FadeIn>
                        </div>
                    </section>

                    {/* Rest of the Team */}
                    <section>
                        <FadeIn className="mb-12 text-center">
                            <h2 className="text-4xl md:text-5xl font-black mb-4">The talented team of creative and jaw-dropping designers and marketers.</h2>
                            <p className="text-xl text-gray-600 max-w-3xl mx-auto">
                                Our dedication and commitment to excellence ensure that your business thrives in the ever-evolving branding design agency.
                            </p>
                        </FadeIn>

                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
                            {FULL_TEAM.slice(1).map((member, idx) => (
                                <FadeIn key={idx} delay={idx * 0.05} className="bg-gray-50 p-8 flex flex-col items-center text-center group rounded-sm border border-transparent hover:border-gray-200 transition-all">
                                    <div className="w-32 h-32 bg-gray-200 rounded-full mb-6 overflow-hidden">
                                        <img 
                                            src={member.image} 
                                            alt={member.name} 
                                            className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" 
                                        />
                                    </div>
                                    <h3 className="text-xl font-bold mb-2">{member.name}</h3>
                                    <p className="text-xs text-gray-500 uppercase tracking-widest font-semibold">{member.role}</p>
                                </FadeIn>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };

        // ==================================================================================
        // MAIN APP COMPONENT
        // ==================================================================================

        const App = () => {
            const [currentPage, setCurrentPage] = useState("Home");
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            // Scroll to top automatically when navigating to a new page
            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [currentPage]);

            const renderPage = () => {
                switch(currentPage) {
                    case "Home": 
                        return <HomePage setPage={setCurrentPage} />;
                    case "About Us":
                        return <AboutPage />;
                    case "Service":
                        return <ServicePage />;
                    case "Media Coverage":
                        return <MediaCoveragePage />;
                    case "Projects":
                        return <ProjectsPage />;
                    case "Contact Us":
                        return <ContactPage />;
                    case "People":
                        return <PeoplePage />;
                    default: 
                        return <HomePage setPage={setCurrentPage} />;
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <Header setPage={setCurrentPage} currentPage={currentPage} isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} />
                    
                    <main className="flex-grow">
                        <AnimatePresence mode="wait">
                            <motion.div
                                key={currentPage}
                                initial={{ opacity: 0, y: 10 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -10 }}
                                transition={{ duration: 0.3 }}
                            >
                                {renderPage()}
                            </motion.div>
                        </AnimatePresence>
                    </main>

                    <Footer setPage={setCurrentPage} />
                </div>
            );
        };

        // Render the React application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
